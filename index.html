<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>記憶アプリ</title>

<style>
body {
  font-family: sans-serif;
  font-size: 1000px;
}

button {
  margin: 5px;
  padding: 10px;
  font-size: 18px;
}

textarea {
  width: 90%;
  height: 100px;
  font-size: 20px;
  margin: 5px;
}
</style>

</head>

<body>

<h2>カード登録</h2>

<textarea id="q" placeholder="問題"></textarea><br>

<textarea id="a" placeholder="答え"></textarea><br>

<button onclick="addCard()">追加</button>

<h2>学習</h2>

<div id="card">ここに問題が出る</div><br>

<button onclick="showAnswer()">答え</button><br>

<button onclick="correct(true)">正解</button>

<button onclick="correct(false)">ミス</button>

<h2>一覧</h2>

<button onclick="toggleList()">表示/非表示</button>

<div id="listWrap" style="display:none;">
  <ul id="list"></ul>
</div>

<h2>データ管理</h2>

<button onclick="exportData()">バックアップ</button><br>

<input type="file" onchange="importData(event)">

<script>

let cards = JSON.parse(localStorage.getItem("cards") || "[]");

let current = null;

// 出題スケジュール（日）
const schedule = [1, 3, 7, 30];

function save() {
  localStorage.setItem("cards", JSON.stringify(cards));
}

function addCard() {

  let q = document.getElementById("q").value;
  let a = document.getElementById("a").value;

  if (!q || !a) {
    alert("入力して");
    return;
  }

  cards.push({
    q,
    a,
    step: 0,
    next: Date.now(),
    correctCount: 0,
    wrongCount: 0
  });

  save();

  renderList();

  document.getElementById("q").value = "";
  document.getElementById("a").value = "";
}

function renderList() {

  let list = document.getElementById("list");

  list.innerHTML = "";

  cards.forEach((c, i) => {

    let li = document.createElement("li");

    li.textContent =
      c.q +
      " → " +
      c.a +
      " | ○:" +
      (c.correctCount || 0) +
      " ×:" +
      (c.wrongCount || 0);

    let del = document.createElement("button");

    del.textContent = "削除";

    del.onclick = () => {

      cards.splice(i, 1);

      save();

      renderList();
    };

    li.appendChild(del);

    list.appendChild(li);
  });
}

function toggleList() {

  const el = document.getElementById("listWrap");

  el.style.display =
    (el.style.display === "none")
    ? "block"
    : "none";
}

function nextCard() {

  let now = Date.now();

  if (cards.length === 0) {

    document.getElementById("card").innerText =
      "カードを追加してください";

    return;
  }

  let due = cards.filter(c => c.next <= now);

  if (due.length === 0) {

    document.getElementById("card").innerText =
      "今日は終了";

    return;
  }

  current =
    due[Math.floor(Math.random() * due.length)];

  document.getElementById("card").innerText =
    current.q;
}

function showAnswer() {

  if (current) {

    document.getElementById("card").innerText =
      current.q + " → " + current.a;
  }
}

function correct(ok) {

  if (!current) return;

  if (ok) {

    current.correctCount =
      (current.correctCount || 0) + 1;

    let days = schedule[current.step];

    if (current.step < schedule.length - 1) {
      current.step++;
    }

    current.next =
      Date.now() +
      days * 24 * 60 * 60 * 1000;

  } else {

    current.wrongCount =
      (current.wrongCount || 0) + 1;

    current.step = 0;

    // 1分後に再出題
    current.next =
      Date.now() + 1 * 60 * 1000;
  }

  save();

  nextCard();
}

function exportData() {

  let blob =
    new Blob(
      [JSON.stringify(cards)],
      { type: "application/json" }
    );

  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");

  a.href = url;

  a.download = "backup.json";

  a.click();
}

function importData(e) {

  let file = e.target.files[0];

  let reader = new FileReader();

  reader.onload = function() {

    cards = JSON.parse(reader.result);

    save();

    renderList();
  };

  reader.readAsText(file);
}

renderList();

nextCard();

</script>

</body>
</html>
